    const DB='la28db',ST='notes';
    const odb=()=>new Promise((r,j)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=()=>q.result.createObjectStore(ST);q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)});
    const iGet=async k=>{try{const db=await odb();return new Promise(r=>{const t=db.transaction(ST,'readonly').objectStore(ST).get(k);t.onsuccess=()=>r(t.result??null);t.onerror=()=>r(null)})}catch(e){try{const v=localStorage.getItem(k);return v?JSON.parse(v):null}catch{return null}}};

      const[chosen,setChosen]=useState(DEF);
      const[q,setQ]=useState("");

      useEffect(()=>{Promise.all([iGet("ol-notes"),iGet("ol-sel")]).then(([n,s])=>{if(n&&typeof n==='object')setNotes(n);if(s&&Array.isArray(s))setChosen(s);setLoaded(true)})},[]);

      const flash=m=>{setToast(m);setTimeout(()=>setToast(null),2000)};
      const pNotes=useCallback(u=>{setNotes(u);iSet("ol-notes",u)},[]);
      const pChosen=useCallback(u=>{setChosen(u);iSet("ol-sel",u)},[]);

      const saveNote=()=>{if(!sel||!ni.trim())return;pNotes({...notes,[sel]:ni.trim()});setEd(false);flash("Note saved")};
      const delNote=()=>{if(!sel)return;const u={...notes};delete u[sel];pNotes(u);setNi("");setEd(false);flash("Note deleted")};
      useEffect(()=>{if(sel&&notes[sel])setNi(notes[sel]);else setNi("");setEd(false)},[sel]);

      const toggle=k=>{const n=chosen.includes(k)?chosen.filter(s=>s!==k):[...chosen,k];pChosen(n)};

      const off=6,days=31;
      const cells=useMemo(()=>{const c=[];for(let i=0;i<off;i++)c.push(null);for(let d=1;d<=days;d++)c.push(d);return c},[]);

      const evts=d=>{const r=[];for(const k of chosen){if(SCH[k]&&SCH[k][d])r.push({sport:k,...SCH[k][d]})}return r};
      const medal=d=>{for(const k of Object.keys(SCH)){if(SCH[k][d]&&SCH[k][d].d.includes("\u2605"))return true}return false};
      const sEvts=sel?evts(sel):[];
      const filt=useMemo(()=>Object.keys(SP).filter(k=>SP[k].l.toLowerCase().includes(q.toLowerCase())),[q]);

      if(!loaded)return<div style={{minHeight:"100vh",background:"#0a0e27",display:"flex",alignItems:"center",justifyContent:"center",fontFamily:"'Outfit'",color:"rgba(255,255,255,0.4)"}}>Loading...</div>;

      return(
        <div style={{minHeight:"100vh",background:"linear-gradient(145deg,#0a0e27 0%,#121a3a 40%,#1a1040 100%)",fontFamily:"'Segoe UI','Helvetica Neue',sans-serif",color:"#e8e6f0",padding:"env(safe-area-inset-top,16px) 20px 32px",maxWidth:720,margin:"0 auto"}}>
          <style>{`
            @import url('https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&family=Space+Mono:wght@400;700&display=swap');
            *{box-sizing:border-box}
            .cg{display:grid;grid-template-columns:repeat(7,1fr);gap:4px}
            .dh{font-family:'Space Mono',monospace;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:2px;color:rgba(255,255,255,0.35);text-align:center;padding:8px 0}
            .dc{aspect-ratio:1;border-radius:10px;display:flex;flex-direction:column;align-items:center;justify-content:flex-start;padding:6px 2px 4px;cursor:pointer;position:relative;transition:all .2s;border:1.5px solid transparent;background:rgba(255,255,255,0.03);-webkit-user-select:none}
            .dc:hover{background:rgba(255,255,255,0.08);transform:scale(1.04);z-index:2}
            .dc.s{border-color:rgba(255,255,255,0.4);background:rgba(255,255,255,0.1);box-shadow:0 0 20px rgba(255,255,255,0.08)}
            .dc.c{background:linear-gradient(135deg,rgba(255,215,0,0.12),rgba(255,140,0,0.08));border-color:rgba(255,215,0,0.3)}
            .dn{font-family:'Outfit',sans-serif;font-size:14px;font-weight:600;color:rgba(255,255,255,0.85);margin-bottom:3px}
            .dc.e{background:transparent;cursor:default}.dc.e:hover{transform:none;background:transparent}
            .dc.ne{opacity:.4}
            .sd{display:flex;flex-wrap:wrap;gap:2px;justify-content:center;align-items:center;max-width:100%}
            .dot{width:6px;height:6px;border-radius:50%;flex-shrink:0}
            .nd{width:6px;height:6px;border-radius:2px;flex-shrink:0;background:${NC};box-shadow:0 0 4px ${NC}80}
            .ms{position:absolute;top:2px;right:3px;font-size:9px}
            .dp{background:rgba(255,255,255,0.05);border:1px solid rgba(255,255,255,0.1);border-radius:14px;padding:20px;margin-top:16px;backdrop-filter:blur(10px)}
            .ec{display:flex;align-items:flex-start;gap:12px;padding:12px;border-radius:10px;margin-bottom:8px;border-left:3px solid}
            .cb{font-family:'Outfit',sans-serif;font-size:8px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:#FFD700;position:absolute;bottom:2px;left:50%;transform:translateX(-50%);white-space:nowrap}
            .nt{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(0,201,167,0.3);border-radius:8px;color:#e8e6f0;font-family:'Outfit',sans-serif;font-size:13px;padding:10px 12px;resize:vertical;min-height:60px;outline:none}
            .nt:focus{border-color:${NC}}.nt::placeholder{color:rgba(255,255,255,0.2)}
            .nb{font-family:'Outfit',sans-serif;font-size:12px;font-weight:600;padding:8px 16px;border-radius:8px;border:none;cursor:pointer}
            .nb:active{transform:scale(.97)}
            .ns{background:${NC};color:#0a0e27}.ncn{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.5);border:1px solid rgba(255,255,255,0.1)}
            .ndl{background:rgba(230,57,70,0.15);color:#E63946;border:1px solid rgba(230,57,70,0.25)}
            .ned{background:rgba(0,201,167,0.12);color:${NC};border:1px solid rgba(0,201,167,0.25)}
            .vl{display:flex;align-items:flex-start;gap:4px;margin-top:4px}.vp{font-size:10px;flex-shrink:0;margin-top:1px}
            .toast{position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:rgba(0,201,167,0.9);color:#0a0e27;font-family:'Outfit',sans-serif;font-size:13px;font-weight:600;padding:10px 20px;border-radius:10px;z-index:1000;pointer-events:none;animation:fadeT 2s forwards}
            @keyframes fadeT{0%{opacity:0;transform:translateX(-50%) translateY(10px)}10%{opacity:1;transform:translateX(-50%) translateY(0)}80%{opacity:1}100%{opacity:0}}
            .ov{position:fixed;inset:0;background:rgba(0,0,0,0.7);z-index:900;display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(4px)}
            .pk{background:linear-gradient(180deg,#151b38,#0e1228);border-radius:20px 20px 0 0;width:100%;max-width:720px;max-height:85vh;display:flex;flex-direction:column;padding:20px;animation:sU .3s ease}
            @keyframes sU{from{transform:translateY(100%)}to{transform:translateY(0)}}
            .pks{width:100%;background:rgba(255,255,255,0.06);border:1px solid rgba(255,255,255,0.12);border-radius:10px;color:#e8e6f0;font-family:'Outfit',sans-serif;font-size:14px;padding:10px 14px;outline:none;margin-bottom:12px}
            .pks:focus{border-color:rgba(255,255,255,0.3)}.pks::placeholder{color:rgba(255,255,255,0.25)}
            .pkg{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;overflow-y:auto;flex:1;padding-bottom:8px;-webkit-overflow-scrolling:touch}
            .sc{display:flex;align-items:center;gap:8px;padding:10px 12px;border-radius:10px;border:1.5px solid transparent;cursor:pointer;transition:all .15s;background:rgba(255,255,255,0.03);-webkit-user-select:none}
            .sc:active{transform:scale(.97)}.sc.on{background:rgba(255,255,255,0.08)}
            @media(max-width:480px){.dc{padding:4px 1px 3px;border-radius:8px}.dn{font-size:12px;margin-bottom:2px}.dot,.nd{width:5px;height:5px}.sd{gap:1px}.pkg{grid-template-columns:1fr 1fr}}
          `}</style>

          {toast&&<div className="toast">{toast}</div>}

          <div style={{textAlign:"center",marginBottom:20,paddingTop:12}}>
            <div style={{fontFamily:"'Space Mono',monospace",fontSize:11,fontWeight:700,letterSpacing:6,textTransform:"uppercase",color:"rgba(255,255,255,0.3)",marginBottom:6}}>Los Angeles 2028</div>
            <h1 style={{fontFamily:"'Outfit',sans-serif",fontSize:28,fontWeight:800,margin:0,background:"linear-gradient(135deg,#FFD700 0%,#FF8C00 50%,#E63946 100%)",WebkitBackgroundClip:"text",WebkitTextFillColor:"transparent"}}>Olympic Games Schedule</h1>
            <p style={{fontFamily:"'Outfit',sans-serif",fontSize:13,color:"rgba(255,255,255,0.35)",margin:"4px 0 0",fontWeight:300}}>July 2028</p>
          </div>

          <div style={{display:"flex",alignItems:"center",gap:8,marginBottom:16,flexWrap:"wrap"}}>
            <button onClick={()=>setPicker(true)} style={{fontFamily:"'Outfit',sans-serif",fontSize:12,fontWeight:600,padding:"8px 14px",borderRadius:10,border:"1.5px solid rgba(255,255,255,0.15)",background:"rgba(255,255,255,0.06)",color:"#fff",cursor:"pointer",whiteSpace:"nowrap"}}>{"\u2699\uFE0F"} Sports ({chosen.length})</button>
            <div style={{display:"flex",gap:4,flexWrap:"wrap",flex:1}}>
              {chosen.slice(0,12).map(k=>SP[k]&&<div key={k} style={{display:"flex",alignItems:"center",gap:3,padding:"3px 7px",borderRadius:6,background:`${SP[k].c}18`,border:`1px solid ${SP[k].c}40`}}><span style={{fontSize:11}}>{SP[k].i}</span><div style={{width:5,height:5,borderRadius:"50%",background:SP[k].c}}/></div>)}
              {chosen.length>12&&<span style={{fontFamily:"'Outfit'",fontSize:11,color:"rgba(255,255,255,0.35)",padding:"3px 6px"}}>+{chosen.length-12}</span>}
            </div>
          </div>

          <div className="cg">
            {DOW.map(d=><div key={d} className="dh">{d}</div>)}
            {cells.map((day,idx)=>{
              if(day===null)return<div key={`e${idx}`}className="dc e"/>;
              const ev=evts(day),isCer=!!CER[day],hasEv=ev.length>0,isMed=medal(day),hasN=!!notes[day];
              return(<div key={day}className={`dc${sel===day?" s":""}${isCer?" c":""}${!hasEv&&!isCer&&!hasN?" ne":""}`}onClick={()=>setSel(sel===day?null:day)}>
                <span className="dn">{day}</span>
                {isMed&&<span className="ms">{"\u{1F3C5}"}</span>}
                <div className="sd">
                  {ev.slice(0,6).map((e,j)=><div key={j}className="dot"style={{backgroundColor:SP[e.sport].c,boxShadow:`0 0 4px ${SP[e.sport].c}80`}}/>)}
                  {ev.length>6&&<span style={{fontSize:7,color:"rgba(255,255,255,0.4)",fontFamily:"'Outfit'"}}> +{ev.length-6}</span>}
                  {hasN&&<div className="nd"/>}
                </div>
                {isCer&&<span className="cb">{day===14?"OPEN":"CLOSE"}</span>}
              </div>);
            })}
          </div>

          {sel&&(<div className="dp">
            <div style={{display:"flex",alignItems:"baseline",gap:10,marginBottom:14}}>
              <span style={{fontFamily:"'Outfit'",fontSize:24,fontWeight:700,color:"#fff"}}>July {sel}</span>
              <span style={{fontFamily:"'Space Mono'",fontSize:11,color:"rgba(255,255,255,0.35)",letterSpacing:1,textTransform:"uppercase"}}>{DOW[(off+sel-1)%7]} &middot; Day {sel-14}</span>
            </div>
            {CER[sel]&&<div style={{background:"linear-gradient(135deg,rgba(255,215,0,0.15),rgba(255,140,0,0.08))",border:"1px solid rgba(255,215,0,0.25)",borderRadius:10,padding:"12px 14px",marginBottom:12,display:"flex",alignItems:"center",gap:10}}>
              <span style={{fontSize:20}}>{"\u{1F3DF}\uFE0F"}</span><div><div style={{fontFamily:"'Outfit'",fontWeight:600,fontSize:14,color:"#FFD700"}}>{CER[sel]}</div><div className="vl"><span className="vp">{"\u{1F4CD}"}</span><span style={{fontFamily:"'Space Mono'",fontSize:10,color:"rgba(255,255,255,0.35)"}}>LA Memorial Coliseum & 2028 Stadium, Inglewood</span></div></div>
            </div>}
            {sEvts.length>0?sEvts.map((e,i)=>(<div key={i}className="ec"style={{backgroundColor:`${SP[e.sport].c}18`,borderLeftColor:SP[e.sport].c}}>
              <span style={{fontSize:20,marginTop:2}}>{SP[e.sport].i}</span>
              <div style={{flex:1,minWidth:0}}>
                <div style={{fontFamily:"'Outfit'",fontWeight:600,fontSize:13,color:SP[e.sport].c}}>{SP[e.sport].l}</div>
                <div style={{fontFamily:"'Outfit'",fontSize:12,color:"rgba(255,255,255,0.55)",marginTop:2}}>{e.d}</div>
                <div className="vl"><span className="vp">{"\u{1F4CD}"}</span><span style={{fontFamily:"'Space Mono'",fontSize:9,color:"rgba(255,255,255,0.3)",lineHeight:1.4}}>{e.v||SP[e.sport].v}</span></div>
              </div>
            </div>)):!CER[sel]&&!notes[sel]&&<p style={{fontFamily:"'Outfit'",fontSize:13,color:"rgba(255,255,255,0.3)",textAlign:"center",margin:"8px 0"}}>No selected sports on this day.</p>}

            <div style={{marginTop:14,borderTop:"1px solid rgba(255,255,255,0.08)",paddingTop:14}}>
              <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginBottom:8}}>
                <div style={{display:"flex",alignItems:"center",gap:6}}><span style={{fontSize:13}}>{"\u{1F4DD}"}</span><span style={{fontFamily:"'Outfit'",fontSize:13,fontWeight:600,color:NC}}>My Notes</span></div>
                {notes[sel]&&!ed&&<div style={{display:"flex",gap:6}}><button className="nb ned"onClick={()=>setEd(true)}>Edit</button><button className="nb ndl"onClick={delNote}>Delete</button></div>}
              </div>
              {notes[sel]&&!ed?<div style={{background:NBG,border:`1px solid ${NBR}`,borderRadius:8,padding:"10px 14px",fontFamily:"'Outfit'",fontSize:13,color:"rgba(255,255,255,0.7)",lineHeight:1.6,whiteSpace:"pre-wrap"}}>{notes[sel]}</div>
              :<div><textarea className="nt"placeholder="Add a note for this day..."value={ni}onChange={e=>{setNi(e.target.value);if(!ed)setEd(true)}}rows={3}/>
                {ed&&<div style={{display:"flex",gap:8,marginTop:8,justifyContent:"flex-end"}}><button className="nb ncn"onClick={()=>{setNi(notes[sel]||"");setEd(false)}}>Cancel</button><button className="nb ns"onClick={saveNote}style={{opacity:ni.trim()?1:.4}}>Save</button></div>}
              </div>}
            </div>
          </div>)}

          <div style={{textAlign:"center",marginTop:20,fontFamily:"'Space Mono'",fontSize:10,color:"rgba(255,255,255,0.2)",lineHeight:1.6}}> Schedule subject to change &middot; Source: LA28.org & NBC Sports<br/>{"\u{1F3C5}"} = Medal events &middot; Tap a day for details</div>

          {picker&&<div className="ov"onClick={e=>{if(e.target===e.currentTarget)setPicker(false)}}>
            <div className="pk">
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:12}}>
                <h2 style={{fontFamily:"'Outfit'",fontSize:20,fontWeight:700,color:"#fff"}}>Select Sports</h2>
                <button onClick={()=>setPicker(false)}style={{background:"rgba(255,255,255,0.1)",border:"none",borderRadius:8,padding:"8px 14px",color:"#fff",fontFamily:"'Outfit'",fontSize:13,fontWeight:600,cursor:"pointer"}}>Done ({chosen.length})</button>
              </div>
              <input className="pks"placeholder="Search sports..."value={q}onChange={e=>setQ(e.target.value)}/>
              <div style={{display:"flex",gap:8,marginBottom:12}}>
                <button onClick={()=>pChosen(Object.keys(SP))}style={{fontSize:11,fontFamily:"'Outfit'",fontWeight:500,padding:"6px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",cursor:"pointer"}}>Select All</button>
                <button onClick={()=>pChosen([])}style={{fontSize:11,fontFamily:"'Outfit'",fontWeight:500,padding:"6px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",cursor:"pointer"}}>Clear All</button>
                <button onClick={()=>pChosen([...DEF])}style={{fontSize:11,fontFamily:"'Outfit'",fontWeight:500,padding:"6px 12px",borderRadius:6,border:"1px solid rgba(255,255,255,0.12)",background:"rgba(255,255,255,0.04)",color:"rgba(255,255,255,0.5)",cursor:"pointer"}}>Defaults</button>
              </div>
              <div className="pkg">
                {filt.map(k=>{const on=chosen.includes(k);return(<div key={k}className={`sc${on?" on":""}`}onClick={()=>toggle(k)}style={on?{borderColor:`${SP[k].c}60`}:{}}>
                  <span style={{fontSize:18}}>{SP[k].i}</span>
                  <div style={{flex:1,minWidth:0}}><div style={{fontFamily:"'Outfit'",fontSize:12,fontWeight:on?600:400,color:on?SP[k].c:"rgba(255,255,255,0.5)",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}}>{SP[k].l}</div></div>
                  <div style={{width:18,height:18,borderRadius:4,border:`2px solid ${on?SP[k].c:"rgba(255,255,255,0.15)"}`,background:on?SP[k].c:"transparent",display:"flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>{on&&<span style={{color:"#fff",fontSize:11,fontWeight:700}}>{"\u2713"}</span>}</div>
                </div>)})}
              </div>
            </div>
          </div>}
        </div>
      );
    }

    if('serviceWorker' in navigator)navigator.serviceWorker.register('./sw.js').catch(()=>{});
    ReactDOM.render(<App/>,document.getElementById("root"));
  </script>
</body>
</html>
